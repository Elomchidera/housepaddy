<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - HOUSEPADDY</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--bg:#0B1120; --card:#1E293B; --text:#F1F5F9; --muted:#94A3B8; --header:#0F172A; --border:#334155; --gold:#FDBA2C; --green:#10B981;}
  body{background:var(--bg); color:var(--text); font-family:Inter, sans-serif; max-width:430px; margin:0 auto; padding-bottom:90px;}
  input{background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:12px; font-size:14px; width:100%;}
</style>
</head>
<body>

<header style="position:sticky; top:0; background:var(--header); padding:12px 16px; z-index:10; border-bottom:1px solid var(--border);">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="background:#0F2A43; width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center;">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2.2"><path d="M3 10.5L12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-9z"></path><path d="M9 21V12h6v9"></path></svg>
      </div>
      <div>
        <h1 style="font-size:24px; font-weight:700; margin:0; color:var(--text); line-height:1;">HOUSE<span style="color:var(--gold);">PADDY</span></h1>
        <p style="font-size:10px; color:var(--muted); margin:2px 0 0 0;">Rent Smart, Live Better</p>
      </div>
    </div>
    <button onclick="history.back()" style="background:0; border:0; cursor:pointer;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
    </button>
  </div>
</header>

<main style="padding:16px;">
  <div style="background:var(--card); padding:24px; border-radius:16px; margin-top:20px;">
    <h2 style="font-size:22px; font-weight:700; margin-bottom:6px; color:var(--text);">Welcome Back</h2>
    <p style="color:var(--muted); font-size:13px; margin-bottom:20px;">Log in to discover properties, list shops, or check labor status.</p>
    
    <form id="loginForm" onsubmit="handleLogin(event)" style="display:flex; flex-direction:column; gap:14px;">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" style="background:var(--gold); color:#0B1120; font-weight:700; padding:14px; border-radius:12px; border:0; cursor:pointer; font-size:15px; margin-top:10px;">Login</button>
    </form>
    
    <p style="text-align:center; font-size:13px; color:var(--muted); margin-top:16px;">Don't have an account? <a href="signup.html" style="color:var(--gold); font-weight:600;">Sign Up</a></p>
  </div>
</main>

<script>
// --- FIREBASE CONFIGURATION SETUP ---
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID",
  measurementId: "G-754JPVX55"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;

  try {
    await auth.signInWithEmailAndPassword(email, pass);
    alert("Welcome back!");
    window.location.href = "profile.html";
  } catch (error) {
    alert("Failed to sign in: " + error.message);
  }
}
</script>
</body>
</html>
