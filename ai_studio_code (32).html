<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - HOUSEPADDY</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--bg:#0B1120; --card:#1E293B; --text:#F1F5F9; --muted:#94A3B8; --header:#0F172A; --border:#334155; --gold:#FDBA2C; --green:#10B981;}
  body{background:var(--bg); color:var(--text); font-family:Inter, sans-serif; max-width:430px; margin:0 auto; padding-bottom:90px;}
</style>
</head>
<body>

<header style="position:sticky; top:0; background:var(--header); padding:12px 16px; z-index:10; border-bottom:1px solid var(--border);">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="background:#0F2A43; width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center;">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2.2"><path d="M3 10.5L12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-9z"></path><path d="M9 21V12h6v9"></path></svg>
      </div>
      <div>
        <h1 style="font-size:24px; font-weight:700; margin:0; color:var(--text); line-height:1;">HOUSE<span style="color:var(--gold);">PADDY</span></h1>
        <p style="font-size:10px; color:var(--muted); margin:2px 0 0 0;">Rent Smart, Live Better</p>
      </div>
    </div>
    <button onclick="history.back()" style="background:0; border:0; cursor:pointer;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
    </button>
  </div>
</header>

<main style="padding:16px;">
  <div id="profileContainer" style="background:var(--card); padding:20px; border-radius:16px; text-align:center;">
    <p style="color:var(--muted);">Checking authentication status...</p>
  </div>
</main>

<nav style="position:fixed; bottom:0; left:0; right:0; background:#0F2A43; border-top:2px solid var(--gold); display:flex; justify-content:space-around; padding:8px 0; max-width:430px; margin:0 auto; z-index:10;">
  <a href="./index.html" style="display:flex; flex-direction:column; align-items:center; gap:4px; color:#BFDBFE; font-size:11px; font-weight:600; text-decoration:none;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span>Home</span></a>
  <a href="./post.html" style="display:flex; flex-direction:column; align-items:center; gap:4px; color:#BFDBFE; font-size:11px; font-weight:600; text-decoration:none;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg><span>Post</span></a>
  <a href="./profile.html" style="display:flex; flex-direction:column; align-items:center; gap:4px; color:white; font-size:11px; font-weight:600; text-decoration:none;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></a>
</nav>

<script>
// --- FIREBASE CONFIGURATION SETUP ---
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID",
  measurementId: "G-754JPVX55"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(async (user) => {
  const container = document.getElementById('profileContainer');
  if (!user) {
    container.innerHTML = `
      <div style="padding:10px 0;">
        <h2 style="font-size:22px; font-weight:700; margin-bottom:8px;">Sign In Needed</h2>
        <p style="color:var(--muted); font-size:14px; margin-bottom:20px;">Log in to manage your profile, view submissions, and apply as a landlord.</p>
        <a href="login.html" style="display:block; background:var(--gold); color:#0B1120; font-weight:700; padding:14px; border-radius:12px; text-decoration:none; margin-bottom:12px;">Log In</a>
        <a href="signup.html" style="display:block; background:var(--border); color:var(--text); font-weight:700; padding:14px; border-radius:12px; text-decoration:none;">Create Account</a>
      </div>
    `;
    return;
  }

  try {
    const doc = await db.collection('users').doc(user.uid).get();
    const userData = doc.data() || { name: "HOUSEPADDY User", role: "tenant", phone: "N/A" };
    renderDashboard(user, userData);
  } catch (err) {
    container.innerHTML = `<p style="color:red;">Error fetching data: ${err.message}</p>`;
  }
});

async function renderDashboard(user, userData) {
  const container = document.getElementById('profileContainer');
  
  let adminControls = '';
  let postedListingsHTML = '';

  if (userData.role === 'admin') {
    const pendingListings = await db.collection('listings').where('status', '==', 'pending').get();
    const pendingLabor = await db.collection('labor_profiles').where('status', '==', 'pending').get();

    adminControls = `
      <div style="text-align:left; border-top:1px solid var(--border); padding-top:16px; margin-top:20px;">
        <h3 style="font-size:16px; font-weight:700; margin-bottom:12px; color:var(--gold);">🔑 Admin Approvals Queue</h3>
        
        <p style="font-size:13px; font-weight:700; margin-bottom:8px;">Properties Pending (${pendingListings.size})</p>
        ${pendingListings.empty ? '<p style="color:var(--muted); font-size:12px; margin-bottom:12px;">None.</p>' : ''}
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:16px;">
          ${pendingListings.docs.map(doc => `
            <div style="background:var(--bg); padding:10px; border-radius:8px; font-size:12px; display:flex; justify-content:space-between; align-items:center;">
              <div>
                <strong>${doc.data().t}</strong><br>
                <span>${doc.data().p} - ${doc.data().l}</span>
              </div>
              <button onclick="approveListing('${doc.id}', 'listings')" style="background:var(--green); color:white; font-weight:700; padding:4px 8px; border-radius:6px; border:0; cursor:pointer;">Approve</button>
            </div>
          `).join('')}
        </div>

        <p style="font-size:13px; font-weight:700; margin-bottom:8px;">Labor Pending (${pendingLabor.size})</p>
        ${pendingLabor.empty ? '<p style="color:var(--muted); font-size:12px; margin-bottom:12px;">None.</p>' : ''}
        <div style="display:flex; flex-direction:column; gap:8px;">
          ${pendingLabor.docs.map(doc => `
            <div style="background:var(--bg); padding:10px; border-radius:8px; font-size:12px; display:flex; justify-content:space-between; align-items:center;">
              <div>
                <strong>${doc.data().name}</strong><br>
                <span>${doc.data().specialty} - ${doc.data().location}</span>
              </div>
              <button onclick="approveListing('${doc.id}', 'labor_profiles')" style="background:var(--green); color:white; font-weight:700; padding:4px 8px; border-radius:6px; border:0; cursor:pointer;">Approve</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else if (userData.role === 'landlord') {
    const myListings = await db.collection('listings').where('owner', '==', user.email).get();
    postedListingsHTML = `
      <div style="text-align:left; border-top:1px solid var(--border); padding-top:16px; margin-top:20px;">
        <h3 style="font-size:15px; font-weight:700; margin-bottom:12px;">My Listings (${myListings.size})</h3>
        <div style="display:flex; flex-direction:column; gap:8px;">
          ${myListings.empty ? '<p style="color:var(--muted); font-size:12px;">No listings published yet.</p>' : ''}
          ${myListings.docs.map(doc => `
            <div style="background:var(--bg); padding:10px; border-radius:8px; font-size:12px; display:flex; justify-content:space-between; align-items:center;">
              <div><strong>${doc.data().t}</strong><br><span>${doc.data().p}</span></div>
              <span style="font-size:11px; font-weight:700; color:${doc.data().status === 'approved' ? 'var(--green)' : 'var(--gold)'};">${doc.data().status.toUpperCase()}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  container.innerHTML = `
    <div style="width:80px; height:80px; background:#0F2A43; border:3px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 12px;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
    <h2 style="font-size:20px; font-weight:700; margin:0;">${userData.name}</h2>
    <p style="color:var(--gold); font-size:12px; font-weight:600; margin:4px 0 16px;">✓ Verified ${userData.role.toUpperCase()}</p>
    
    <div style="background:var(--bg); padding:12px; border-radius:12px; text-align:left; display:flex; flex-direction:column; gap:10px; margin-bottom:16px;">
      <div style="display:flex; justify-content:space-between;"><span style="color:var(--muted);">📞 Phone</span><span>${userData.phone || 'N/A'}</span></div>
      <div style="display:flex; justify-content:space-between;"><span style="color:var(--muted);">✉️ Email</span><span>${user.email}</span></div>
    </div>

    ${postedListingsHTML}
    ${adminControls}

    <div style="margin-top:20px; display:flex; flex-direction:column; gap:8px;">
      <a href="./post.html" style="display:block; background:var(--gold); color:#0B1120; font-weight:700; padding:14px; border-radius:12px; text-decoration:none;">+ Create New Listing</a>
      <button onclick="handleLogout()" style="display:block; width:100%; background:#EF4444; color:white; font-weight:700; padding:14px; border-radius:12px; border:0; cursor:pointer;">Log Out</button>
    </div>
  `;
}

async function approveListing(id, collectionName) {
  try {
    await db.collection(collectionName).doc(id).update({ status: 'approved' });
    alert("Listing approved successfully!");
    window.location.reload();
  } catch (err) {
    alert("Error approving listing: " + err.message);
  }
}

async function handleLogout() {
  try {
    await auth.signOut();
    alert("Logged out successfully.");
    window.location.href = "index.html";
  } catch (err) {
    alert("Error logging out.");
  }
}
</script>
</body>
</html>
